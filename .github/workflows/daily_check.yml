name: Taipei Leader Monitor Auto Run

on:
  schedule:
    # 每個小時的第 0 分鐘執行一次
    - cron: '0 * * * *'
  workflow_dispatch: # 讓您可以手動點按鈕測試執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Monitor Script
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        # 先拉取雲端最新的變更(如排程設定更新)，避免 push 被拒絕
        git pull --rebase origin main
        # 檢查檔案是否存在，存在才加入
        if [ -f city_leaders_complete.xlsx ]; then
          git add city_leaders_complete.xlsx
          # 只有在有檔案變動時才 commit，避免報錯
          git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes to commit"
          git push origin main
        else
          echo "Excel file not found, skipping commit."
        fi
