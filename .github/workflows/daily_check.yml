name: Taipei Leader Monitor Auto Run

on:
  schedule:
    - cron: '0 * * * *' # 每小時整點跑一次
  workflow_dispatch:     # 讓您可以手動按按鈕

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies (直接安裝，不看 requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 pandas openpyxl

    - name: Run Monitor Script
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        git pull origin main --rebase
        
        if [ -f city_leaders_complete.xlsx ]; then
          git add city_leaders_complete.xlsx
          git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M:%S')" || echo "No changes"
          git push origin main
        else
          echo "File not found, skip."
        fi
