name: Taipei Leader Monitor Cron

on:
  schedule:
    # 💡 設定每小時執行一次 (UTC 時間，0 * * * * 代表每小時的第 0 分鐘)
    - cron: '0 * * * *'
  workflow_dispatch:
    # 💡 允許您在 GitHub 網頁上手動點擊 "Run workflow" 立即測試執行

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas openpyxl

      - name: Run Monitor Task
        env:
          # 💡 這裡會對接到您在 GitHub Settings 設定的 Secrets
         SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
         SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: python main.py

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # 💡 將產生的 Excel 檔案存回 GitHub 倉庫
          git add city_leaders_complete.xlsx history_records/
          git commit -m "自動更新：首長異動紀錄庫 [$(date '+%Y-%m-%d %H:%M')]" || echo "今日無異動資料需存檔"
          git push
