name: Taipei Leader Monitor Auto Run

on:
  schedule:
    # 每個小時的第 0 分鐘執行一次 (台灣時間每小時整點)
    - cron: '0 * * * *'
  workflow_dispatch: # 保留手動執行按鈕

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Monitor Script
      env:
        SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action Bot"
        git config --global user.email "actions@github.com"
        
        # 先拉取最新變更，避免與網頁上的修改衝突
        git pull --rebase origin main
        
        # 檢查 Excel 檔案是否有產生或變動
        if [ -n "$(git status --porcelain city_leaders_complete.xlsx)" ]; then
          git add city_leaders_complete.xlsx
          git commit -m "Auto update: $(date +'%Y-%m-%d %H:%M:%S')"
          git push origin main
          echo "✅ 偵測到資料更新，已存回 GitHub。"
        else
          echo "ℹ️ 資料無變動，跳過存檔步驟。"
        fi
