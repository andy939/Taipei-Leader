name: Taipei Leader Monitor

on:
  schedule:
    # UTC 01:30 = 台灣時間 09:30，每天執行一次
    - cron: '30 1 * * *'
    # 其他可用排程（取消註解即可啟用）：
    # - cron: '0 0 * * *'    # 每天 UTC 00:00 = 台灣 08:00
    # - cron: '30 1 * * 1-5' # 週一~五 台灣 09:30
    # - cron: '0 */6 * * *'  # 每 6 小時

  # 允許手動在 GitHub Actions 頁面觸發
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monitor
        env:
          SMTP_SERVER:     smtp.gmail.com
          SMTP_PORT:       "587"
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          TZ: Asia/Taipei
        run: python main.py

      - name: Commit updated Excel (only when changed)
        env:
          TZ: Asia/Taipei
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"

          # 先 stage，再用 --cached 判斷（新檔案＋修改都能偵測到）
          git add city_leaders_latest.xlsx 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "首長資料無異動，不需 commit"
          else
            git commit -m "首長資料更新：$(date '+%Y-%m-%d %H:%M') (台灣時間)"
            git push origin main
            echo "已推送更新至 GitHub"
          fi
