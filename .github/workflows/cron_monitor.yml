name: Taipei Leader Monitor Cron

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # 💡 確保拉取所有歷史紀錄，避免 push 被拒絕
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pandas openpyxl schedule

      - name: Run Monitor Task
        env:
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
        run: python main.py

      - name: Commit and Push changes
        env:
          TZ: Asia/Taipei
        run: |
         git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 💡 1. 強制從網頁拉取最新狀態，但不進行合併 (避免衝突)
          git fetch origin main
          git checkout main
          
          # 💡 2. 確保資料夾存在
          mkdir -p history_records
          
          # 💡 3. 把新產生的檔案蓋過去
          git add city_leaders_complete.xlsx history_records/
          
          # 💡 4. Commit 檔案
          git commit -m "自動更新：異動紀錄 [$(date '+%Y-%m-%d %H:%M')]" || echo "無資料異動需存檔"
          
          # 💡 5. 強力推回網頁端，解決 [rejected] 錯誤
          git push origin main --force
          # 💡 4. 關鍵：先拉取最新狀態並強制合併，解決 rejected 錯誤
          git pull --rebase origin main
          
          # 💡 5. 強力推上去，確保首頁 Code 會更新
          git push origin main --force
